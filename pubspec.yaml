name: new_launcher
description: A Flutter-based Android launcher
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  url_launcher: ^6.0.0
  sqflite: ^2.0.0
  permission_handler: ^10.0.0
  shared_preferences: ^2.0.0
  provider: ^6.0.0
  http: ^1.0.0
  cupertino_icons: ^1.0.0
  device_apps: ^2.0.0
  geolocator: ^11.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true