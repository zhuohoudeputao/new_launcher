name: new_launcher
description: A Flutter-based Android launcher
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.0.0
  provider: ^6.0.0
  http: ^1.0.0
  cupertino_icons: ^1.0.0
  device_apps: ^2.2.0
  geolocator: ^11.1.0
  image_picker: ^1.0.0
  path_provider: ^2.0.0
  battery_plus: ^6.0.0
  torch_light: ^1.0.0
  qr_flutter: ^4.1.0
  url_launcher: ^6.3.0
  crypto: ^3.0.0
  flutter_markdown: ^0.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - test_assets/